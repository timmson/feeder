<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feeder - Курсы и индикаторы</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --container-bg: white;
            --text-primary: #333;
            --text-secondary: #666;
            --indicator-bg: #f8f9fa;
            --indicator-hover-shadow: rgba(0, 0, 0, 0.1);
            --error-bg: #fee;
            --error-text: #c33;
            --accent-color: #667eea;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --container-bg: #1e1e2e;
            --text-primary: #e0e0e0;
            --text-secondary: #a0a0a0;
            --indicator-bg: #2a2a3e;
            --indicator-hover-shadow: rgba(0, 0, 0, 0.3);
            --error-bg: #3e2a2a;
            --error-text: #ff6b6b;
            --accent-color: #8b7ec8;
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.3s, color 0.3s, box-shadow 0.3s;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: var(--container-bg);
            border-radius: 16px;
            box-shadow: var(--shadow);
            padding: 40px;
            max-width: 600px;
            width: 100%;
            position: relative;
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            color: var(--text-primary);
        }

        .theme-toggle:hover {
            background: var(--indicator-bg);
        }
        h1 {
            color: var(--text-primary);
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
            padding-right: 50px;
        }
        .subtitle {
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .last-update {
            text-align: center;
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 20px;
        }
        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px;
        }
        .error {
            background: var(--error-bg);
            color: var(--error-text);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .indicator {
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 12px;
            background: var(--indicator-bg);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .indicator:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px var(--indicator-hover-shadow);
        }
        .indicator-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .indicator-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }
        .indicator-value {
            font-size: 24px;
            font-weight: bold;
            color: var(--accent-color);
        }
        .indicator-link {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 12px;
        }
        .indicator-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <button aria-label="Переключить тему" class="theme-toggle" onclick="toggleTheme()">
            <span id="theme-icon">🌙</span>
        </button>
        <h1>📊 Курсы и индикаторы</h1>
        <p class="subtitle">Актуальные финансовые показатели</p>
        <p class="last-update" id="last-update">Обновлено: --</p>
        
        <div id="content">
            <div class="loading">Загрузка данных...</div>
        </div>
    </div>

    <script>
        const indicators = {
            usd: { icon: '💵', name: 'Курс USD', unit: 'руб.', link: 'https://www.cbr.ru/currency_base/daily/' },
            eur: { icon: '💶', name: 'Курс EUR', unit: 'руб.', link: 'https://www.cbr.ru/currency_base/daily/' },
            imoex: { icon: '🇷🇺', name: 'Индекс Мосбиржи', unit: '', link: 'https://www.moex.com/ru/index/IMOEX' },
            keyRate: { icon: '🗝', name: 'Ключевая ставка', unit: '%', link: 'https://www.cbr.ru/hd_base/keyrate/' },
            inflation: { icon: '🎈', name: 'Офиц. инфляция', unit: '%', link: 'https://www.cbr.ru/hd_base/infl/' },
            mredc: { icon: '🏡', name: 'Стоимость м2 в Москве', unit: 'руб.', link: 'https://www.moex.com/ru/index/MREDC' }
        };

        function formatNumber(value) {
            return new Intl.NumberFormat('ru-RU', {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            }).format(value);
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            const icon = document.getElementById('theme-icon');

            document.documentElement.setAttribute('data-theme', newTheme);
            icon.textContent = newTheme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', newTheme);
        }

        function initTheme() {
            const savedTheme = localStorage.getItem('theme');
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const theme = savedTheme || (prefersDark ? 'dark' : 'light');
            const icon = document.getElementById('theme-icon');

            document.documentElement.setAttribute('data-theme', theme);
            icon.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        async function loadStocks() {
            const content = document.getElementById('content');
            
            content.innerHTML = '<div class="loading">Загрузка данных...</div>';
            
            try {
                const response = await fetch('/api/stocks');
                if (!response.ok) throw new Error('Ошибка загрузки данных');
                
                const stocks = await response.json();
                
                if (stocks.length === 0) {
                    content.innerHTML = '<div class="error">Нет данных</div>';
                    return;
                }
                
                const html = stocks.map(stock => {
                    const info = indicators[stock.name] || { icon: '📈', name: stock.name, unit: '', link: '#' };
                    const value = formatNumber(stock.price);
                    
                    return `
                        <div class="indicator">
                            <div class="indicator-header">
                                <span class="indicator-name">${info.icon} ${info.name}</span>
                                <a href="${info.link}" target="_blank" class="indicator-link">Источник →</a>
                            </div>
                            <div class="indicator-value">${value} ${info.unit}</div>
                        </div>
                    `;
                }).join('');
                
                content.innerHTML = html;

                // Обновление времени
                const now = new Date();
                const timeStr = now.toLocaleTimeString('ru-RU', {
                    day: '2-digit',
                    month: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                document.getElementById('last-update').textContent = `Обновлено: ${timeStr}`;
            } catch (error) {
                content.innerHTML = `<div class="error">Ошибка: ${error.message}</div>`;
            }
        }

        // Инициализация темы при загрузке
        initTheme();

        // Загрузка при открытии страницы
        loadStocks();
        
        // Автообновление каждые 5 минут
        setInterval(loadStocks, 5 * 60 * 1000);
    </script>
</body>
</html>
